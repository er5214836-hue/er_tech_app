<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E.R Technology - Pro</title>
    <style>
        body {
            background-color: #121212;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }
        h1 { color: #ffffff; font-family: 'Impact', sans-serif; margin-top: 20px; margin-bottom: 5px; letter-spacing: 2px; }
        .subtitulo { color: #777; font-size: 0.8rem; font-weight: bold; margin-bottom: 15px; }
        
        /* TASA EN VERDE */
        .tasa-caja { color: #4caf50; font-size: 1.1rem; font-weight: bold; margin-bottom: 15px; }

        input {
            width: 85%; max-width: 320px; padding: 15px; font-size: 28px;
            border-radius: 12px; border: 2px solid #333; background-color: #1e1e1e;
            color: #4caf50; text-align: right; margin-bottom: 15px; outline: none;
        }

        .teclado {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            width: 85%;
            max-width: 320px;
            margin-bottom: 15px;
        }

        .btn-num {
            background-color: #252525;
            color: white;
            font-size: 1.2rem;
            padding: 15px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
        }

        .btn-op { background-color: #333; color: #ff9800; }
        
        /* BOTÓN C - REINICIO TOTAL */
        .btn-clear { background-color: #ff5252; color: white; font-weight: bold; }

        .btn-group { display: flex; gap: 10px; width: 85%; max-width: 320px; margin-bottom: 10px; }
        button { font-weight: bold; cursor: pointer; transition: 0.2s; border: none; }
        .btn-usd { background-color: #2e7d32; color: white; flex: 1; padding: 12px; border-radius: 8px; }
        .btn-bs { background-color: #1565c0; color: white; flex: 1; padding: 12px; border-radius: 8px; }
        .btn-add { background-color: #ff9800; color: black; width: 85%; max-width: 320px; padding: 15px; border-radius: 8px; margin-bottom: 15px; }

        .carrito-container { width: 85%; max-width: 320px; background: #1e1e1e; padding: 20px; border-radius: 12px; text-align: center; }
        .total-texto { font-size: 1.6rem; font-weight: bold; margin-bottom: 5px; }
    </style>
</head>
<body>

    <h1>E.R TECHNOLOGY</h1>
    <div class="subtitulo">SOLUTIONS & FINANCE</div>
    
    <!-- AQUÍ CAMBIAS LA TASA VISUALMENTE -->
    <div class="tasa-caja">BCV: <span id="tasa-bcv">48.34</span> Bs/$</div>

    <input type="text" id="monto" placeholder="0.00" readonly>

    <div class="teclado">
        <button class="btn-num" onclick="presionar('7')">7</button>
        <button class="btn-num" onclick="presionar('8')">8</button>
        <button class="btn-num" onclick="presionar('9')">9</button>
        <button class="btn-num btn-op" onclick="presionar('/')">/</button>
        
        <button class="btn-num" onclick="presionar('4')">4</button>
        <button class="btn-num" onclick="presionar('5')">5</button>
        <button class="btn-num" onclick="presionar('6')">6</button>
        <button class="btn-num btn-op" onclick="presionar('*')">*</button>
        
        <button class="btn-num" onclick="presionar('1')">1</button>
        <button class="btn-num" onclick="presionar('2')">2</button>
        <button class="btn-num" onclick="presionar('3')">3</button>
        <button class="btn-num btn-op" onclick="presionar('-')">-</button>
        
        <!-- BOTÓN C AHORA LLAMA A reiniciarTodo() -->
        <button class="btn-num btn-clear" onclick="reiniciarTodo()">C</button>
        <button class="btn-num" onclick="presionar('0')">0</button>
        <button class="btn-num" onclick="presionar('.')">.</button>
        <button class="btn-num btn-op" onclick="presionar('+')">+</button>
    </div>

    <div class="btn-group">
        <button class="btn-usd" onclick="convertir('aUSD')">Bs ➜ $</button>
        <button class="btn-bs" onclick="convertir('aBS')">$ ➜ Bs</button>
    </div>

    <button class="btn-add" onclick="sumarAlCarrito()">➕ AÑADIR AL CARRITO</button>

    <div class="carrito-container">
        <div class="total-texto">Total: <span id="total">0.00</span> $</div>
        <div style="color: #4caf50; font-size: 1.2rem;" id="total-bs">0.00 Bs</div>
    </div>

    <script>
        // CONFIGURACIÓN DE TASA (Cámbiala aquí también)
        let tasaOficial = 48.34; 
        
        let totalAcumuladoUSD = 0;
        let pantalla = document.getElementById('monto');

        function presionar(valor) {
            pantalla.value += valor;
        }

        // --- NUEVA FUNCIÓN DE REINICIO TOTAL ---
        function reiniciarTodo() {
            pantalla.value = ""; // Limpia pantalla
            totalAcumuladoUSD = 0; // Pone el carrito en 0
            document.getElementById('total').innerText = "0.00";
            document.getElementById('total-bs').innerText = "0.00 Bs";
        }

        function convertir(tipo) {
            try {
                if(pantalla.value === "") return;
                let valorCalculado = eval(pantalla.value);
                if (tipo === 'aUSD') {
                    pantalla.value = (valorCalculado / tasaOficial).toFixed(2);
                } else {
                    pantalla.value = (valorCalculado * tasaOficial).toFixed(2);
                }
            } catch {
                alert("Error en la cuenta");
                pantalla.value = "";
            }
        }

        function sumarAlCarrito() {
            try {
                if(pantalla.value === "") return;
                let valorCalculado = eval(pantalla.value);
                totalAcumuladoUSD += valorCalculado;
                
                // Actualizar interfaz
                document.getElementById('total').innerText = totalAcumuladoUSD.toFixed(2);
                let totalEnBs = totalAcumuladoUSD * tasaOficial;
                document.getElementById('total-bs').innerText = totalEnBs.toFixed(2) + " Bs";
                
                pantalla.value = ""; 
            } catch {
                alert("Error al sumar");
            }
        }
    </script>
</body>
</html>
